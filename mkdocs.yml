site_description: Diao Shengjia 的技术博客
site_name: Diao Shengjia's Blog
site_url: https://godiao.github.io/
repo_url: https://github.com/GoDiao/blog-source
copyright: Copyright &copy; 2024 Diao Shengjia

theme:
  name: material
  custom_dir: overrides
  language: zh
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: white
      accent: black
      toggle:
        icon: material/weather-sunny
        name: 切换至深色模式
    - scheme: slate
      primary: black
      accent: grey
      toggle:
        icon: material/weather-night
        name: 切换至亮色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - header.autohide
    - navigation.path
    - content.code.copy
    - content.code.annotate
    - toc.follow

nav:
  - 首页: index.md
  - 博客: blog/index.md
  - 论文笔记: papers/index.md
  - 关于: about.md
  - 项目: projects/README.md
  - 工具: tools.md

plugins:
  - search
  - wavedrom:
      embed_svg: true
      pymdownx: true

markdown_extensions:
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.arithmatex:
      generic: true
      block_tag: 'pre'
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: wavedrom
          class: wavedrom
          format: !!python/name:markdownwavedrom.plugin.fence_wavedrom_format
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tilde
  - footnotes
  - pymdownx.magiclink
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/main.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/GoDiao
  analytics:
    provider: custom
