site_description: Diao Shengjia 的技术博客
site_name: Diao Shengjia's Blog
site_url: https://godiao.github.io/
repo_url: https://github.com/GoDiao/blog-source
copyright: Copyright &copy; 2024 Diao Shengjia

theme:
  custom_dir: overrides
  name: material
  icon:
    repo: fontawesome/brands/github
  language: zh
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.footer
    - content.code.copy
    - toc.follow
    - toc.integrate

nav:
  - 首页: index.md
  - 关于: about.md
  - 项目: projects/README.md
  - 工具: tools.md

plugins:
  - search
  - wavedrom:
      embed_svg: true
      pymdownx: true


markdown_extensions:
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: wavedrom
          class: wavedrom
          format: !!python/name:markdownwavedrom.plugin.fence_wavedrom_format
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tilde
  - footnotes

extra_css:
  - stylesheets/main.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github 
      link: https://github.com/GoDiao
  analytics:
    provider: custom
